@if (uiLoading.isLoading()) {
  <div class="pointer-events-none fixed inset-x-0 top-0 z-[9998] h-1.5 overflow-hidden bg-slate-950/30 backdrop-blur-sm shadow-md shadow-indigo-950/50">
    <div class="loading-bar h-full w-full"></div>
  </div>
}
<app-toast-container></app-toast-container>
@if (!isBrowser || !isReady() || !langService.isLanguageReady()) {
  <!-- Splash screen chờ router ổn định -->
  <div @screenTransition class="min-h-screen flex items-center justify-center bg-white">
    <div class="flex flex-col items-center gap-4">
      <div
        class="w-12 h-12 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center shadow-lg">
        <i class="fa-solid fa-bolt text-white text-lg"></i>
      </div>
      <div class="w-6 h-6 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
    </div>
  </div>
} @else {
  <div @screenTransition>
    <router-outlet />
  </div>
}
