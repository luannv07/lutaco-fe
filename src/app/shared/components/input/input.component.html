<div class="mb-4">
  @if (label) {
    <label [for]="type" class="block text-sm font-medium text-gray-700 mb-1">
      {{ label }}
      @if (required) {
        <span class="text-red-500">*</span>
      }
    </label>
  }
  <div [ngClass]="wrapperClasses">
    <!-- Prefix Icon -->
    @if (prefixIcon) {
      <div [ngClass]="iconWrapperClasses" class="left-0 pl-3">
        @if (isPrefixFontAwesomeIcon()) {
          <fa-icon [icon]="prefixIcon" class="text-gray-400"></fa-icon>
        } @else {
          <i [ngClass]="prefixIcon" class="text-gray-400"></i>
        }
      </div>
    }

    <!-- Input Field -->
    <input
      [id]="type"
      [type]="type"
      [value]="value"
      [placeholder]="placeholder"
      [disabled]="disabled"
      [readOnly]="readonly"
      [required]="required"
      [ngClass]="inputClasses"
      (input)="onInput($event)"
      (focus)="onFocus($event)"
      (blur)="onBlur($event)"
    />

    <!-- Suffix Icon -->
    @if (suffixIcon) {
      <div [ngClass]="iconWrapperClasses" class="right-0 pr-3">
        @if (isSuffixFontAwesomeIcon()) {
          <fa-icon [icon]="suffixIcon" class="text-gray-400"></fa-icon>
        } @else {
          <i [ngClass]="suffixIcon" class="text-gray-400"></i>
        }
      </div>
    }
  </div>
  <!-- Error Message -->
  @if (errorMessage) {
    <p class="mt-1 text-sm text-red-600">{{ errorMessage }}</p>
  }
</div>
