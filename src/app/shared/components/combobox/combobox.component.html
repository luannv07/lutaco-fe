<div class="mb-4">
  @if (label) {
    <label class="mb-1.5 block text-sm font-medium text-slate-700" [for]="inputId">
      {{ label }}
      @if (required) {
        <span class="text-red-500">*</span>
      }
    </label>
  }

  <div class="relative">
    <input
      [id]="inputId"
      [name]="name"
      [value]="query || getLabelByValue(value)"
      [required]="required"
      [disabled]="disabled"
      [placeholder]="placeholder"
      [class]="inputClasses"
      autocomplete="off"
      role="combobox"
      aria-autocomplete="list"
      [attr.aria-expanded]="isOpen"
      (focus)="onFocus($event)"
      (blur)="onBlur($event)"
      (input)="onInput($event)"
      (keydown)="onKeyDown($event)"
    />

    @if (!disabled && (query || value)) {
      <button
        type="button"
        class="absolute inset-y-0 right-8 flex w-8 items-center justify-center text-slate-400 transition-colors duration-100 hover:text-slate-600"
        (mousedown)="clearValue($event)"
        aria-label="Clear value"
      >
        <i class="fa-solid fa-xmark"></i>
      </button>
    }

    <button
      type="button"
      class="absolute inset-y-0 right-0 flex w-10 items-center justify-center text-slate-400 transition-transform duration-150"
      [disabled]="disabled"
      [class.rotate-180]="isOpen"
      (click)="togglePanel()"
      tabindex="-1"
      aria-label="Toggle combobox"
    >
      <i class="fa-solid fa-chevron-down"></i>
    </button>

    @if (isOpen) {
      <div
        @panelAnimation
        class="absolute z-[1001] mt-1 max-h-60 w-full overflow-y-auto rounded-lg bg-white shadow-lg ring-1 ring-slate-900/5"
      >
        @if (filteredOptions.length === 0) {
          <div class="px-3 py-2 text-sm text-slate-500">No options</div>
        } @else {
          @for (option of filteredOptions; track option.value; let i = $index) {
            <button
              type="button"
              class="flex w-full items-center px-3 py-2 text-left text-sm transition-colors duration-100 hover:bg-indigo-50"
              [class.bg-indigo-100]="i === highlightedIndex"
              [class.text-indigo-700]="i === highlightedIndex"
              [class.bg-white]="i !== highlightedIndex"
              [class.text-slate-700]="i !== highlightedIndex"
              (mousedown)="onOptionMouseDown($event, option)"
            >
              {{ option.label }}
            </button>
          }
        }
      </div>
    }
  </div>
</div>
