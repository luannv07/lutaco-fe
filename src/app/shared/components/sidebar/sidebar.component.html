<div
  class="fixed left-0 top-0 h-screen w-64 bg-slate-900 text-slate-100 flex flex-col shadow-lg"
>
  <!-- Top: Logo/Brand -->
  <div class="h-16 border-b border-slate-700 flex items-center justify-center px-4">
    <h1 class="text-xl font-bold text-indigo-400">LUTACO</h1>
  </div>

  <!-- Middle: Navigation Menu -->
  <nav class="flex-1 overflow-y-auto py-6 px-3">
    <ul class="space-y-2">
      @for (item of menuItems(); track trackByRoute($index, item)) {
        <li>
          <a
            [routerLink]="item.route"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            class="relative flex items-center gap-3 px-4 py-3 rounded-lg transition-all duration-150 ease-out
              text-slate-300 hover:text-white hover:bg-slate-800
              active:bg-indigo-600 active:text-white active:shadow-lg active:shadow-indigo-600/50"
            [attr.aria-current]="
              true
            "
          >
            <i [ngClass]="item.icon" class="fa-fw w-5 text-center flex-shrink-0"></i>
            <span class="text-sm font-medium">
              {{ getMenuItemLabel(item) }}
            </span>
          </a>
        </li>
      }
    </ul>
  </nav>

  <!-- Bottom: User Actions -->
  <div class="border-t border-slate-700 p-4 space-y-3">
    <!-- Language Switcher -->
    <app-language-switcher></app-language-switcher>

    <!-- Logout Button -->
    <button
      (click)="logout()"
      class="w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-all duration-150 ease-out
        text-red-400 hover:text-red-300 hover:bg-slate-800
        active:scale-95 focus-visible:ring-2 focus-visible:ring-red-500 focus-visible:ring-offset-2 focus-visible:ring-offset-slate-900"
      [title]="'common.logout' | translate"
      [attr.aria-label]="'common.logout' | translate"
    >
      <i class="fa-solid fa-right-from-bracket fa-fw w-5 text-center"></i>
      <span class="text-sm font-medium">
        {{ 'common.logout' | translate }}
      </span>
    </button>
  </div>
</div>
