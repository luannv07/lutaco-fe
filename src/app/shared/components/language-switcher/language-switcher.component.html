<div class="relative inline-block w-full">
  <button
    (click)="toggleDropdown()"
    (blur)="closeDropdown()"
    class="w-full flex items-center justify-between gap-3 px-3 py-2 rounded-lg transition-all duration-150 ease-out
      bg-slate-800 text-slate-300 hover:text-white hover:bg-slate-700
      focus-visible:ring-2 focus-visible:ring-indigo-500 focus-visible:ring-offset-2 focus-visible:ring-offset-slate-900"
    [attr.aria-label]="'Language'"
    [attr.aria-expanded]="showDropdown()"
  >
    <span class="flex items-center gap-2 flex-1">
      <i class="fa-solid fa-globe fa-fw"></i>
      <span class="text-sm font-medium">{{ currentLang() | uppercase }}</span>
    </span>
    <i
      class="fa-solid fa-chevron-down fa-fw transition-transform duration-200"
      [style.transform]="showDropdown() ? 'rotate(180deg)' : 'rotate(0)'"
    ></i>
  </button>

  <!-- Dropdown menu -->
  @if (showDropdown()) {
    <div
      class="absolute bottom-full mb-2 left-0 right-0 bg-slate-800 rounded-lg shadow-lg ring-1 ring-slate-700 overflow-hidden
        animate-in fade-in zoom-in-95 duration-150"
    >
      <ul class="py-1">
        @for (lang of languages; track trackByLang($index, lang)) {
          <li>
            <button
              (click)="switchLanguage(lang.code)"
              [class.active]="currentLang() === lang.code"
              class="w-full flex items-center gap-3 px-4 py-2 text-sm text-slate-300 hover:text-white hover:bg-slate-700
                transition-colors duration-150 ease-out
                active:bg-indigo-600 active:text-white"
            >
              <i [ngClass]="lang.icon" class="fa-fw w-4"></i>
              <span>{{ lang.label }}</span>
              @if (currentLang() === lang.code) {
                <i class="fa-solid fa-check fa-fw ml-auto text-indigo-400"></i>
              }
            </button>
          </li>
        }
      </ul>
    </div>
  }
</div>
