<button
  (click)="toggleLanguage()"
  class="group flex w-full items-center gap-3 rounded-xl border border-white/10 bg-white/5 px-3 py-2.5 text-slate-300 backdrop-blur-sm transition-all duration-200 ease-out hover:-translate-y-0.5 hover:border-white/20 hover:bg-white/10 hover:text-white active:scale-[0.98] focus-visible:ring-2 focus-visible:ring-indigo-500 focus-visible:ring-offset-2 focus-visible:ring-offset-slate-950"
  [attr.aria-label]="'Toggle language: ' + currentLang()"
  [title]="'Current: ' + (currentLang() | uppercase) + ' - Click to switch'"
>
  <span class="flex h-9 w-9 shrink-0 items-center justify-center rounded-xl bg-slate-900/60 text-slate-200 transition-colors duration-200 group-hover:bg-indigo-600 group-hover:text-white">
    <i class="fa-solid fa-globe"></i>
  </span>

  @if (!compact) {
    <span class="flex min-w-0 flex-1 items-center justify-between gap-2">
      <span class="min-w-0">
        <span class="block text-xs uppercase tracking-[0.2em] text-slate-500">Language</span>
        <span class="block text-sm font-semibold text-slate-100">{{ currentLang() | uppercase }}</span>
      </span>
      <i class="fa-solid fa-arrow-right-arrow-left text-xs text-slate-400 transition-transform duration-200 group-hover:rotate-12 group-hover:text-white"></i>
    </span>
  } @else {
    <span class="sr-only">{{ currentLang() | uppercase }}</span>
  }
</button>
