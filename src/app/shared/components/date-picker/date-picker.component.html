<div class="mb-4">
  @if (label) {
    <label class="mb-1.5 block text-sm font-medium text-slate-700" [for]="inputId">
      {{ label }}
      @if (required) {
        <span class="text-red-500">*</span>
      }
    </label>
  }

  <div class="relative">
    <input
      #dateInput
      [id]="inputId"
      [name]="name"
      type="date"
      [value]="value"
      [placeholder]="placeholder"
      [disabled]="disabled"
      [required]="required"
      [min]="min"
      [max]="max"
      [class]="inputClasses"
      (input)="onInput($event)"
      (focus)="onFocus($event)"
      (blur)="onBlur($event)"
    />

    <button
      type="button"
      class="absolute inset-y-0 right-0 flex w-10 items-center justify-center text-slate-400 transition-colors duration-150 hover:text-indigo-600"
      [disabled]="disabled"
      aria-label="Open date picker"
      (mousedown)="openPicker($event)"
    >
      <i class="fa-solid fa-calendar-days"></i>
    </button>
  </div>
</div>
