<div class="fixed top-4 right-4 z-[9999] flex flex-col items-end gap-2 pointer-events-none">
  @for (toast of toasts$ | async; track toast.id) {
    <app-toast
      (close)="removeToast(toast.id)"
      [duration]="toast.duration"
      [message]="toast.message"
      [title]="toast.title"
      [type]="toast.type"
      class="pointer-events-auto"
    ></app-toast>
  }
</div>
