<div
  class="relative flex min-h-screen items-center justify-center overflow-hidden bg-gradient-to-br from-indigo-50 via-white to-purple-50 px-4 py-8 sm:px-6 sm:py-10 lg:px-8">

  <div
    class="absolute -top-32 -left-32 w-96 h-96 bg-indigo-300 rounded-full opacity-20 blur-3xl pointer-events-none"></div>
  <div
    class="absolute -bottom-24 -right-24 w-80 h-80 bg-purple-300 rounded-full opacity-20 blur-3xl pointer-events-none"></div>

  <form
    (ngSubmit)="onSubmit()"
    class="w-full max-w-xl rounded-2xl bg-white p-6 shadow-xl shadow-indigo-100/50 sm:p-8 lg:p-10 animate-[slideUp_0.4s_ease-out]">

    <!-- Brand -->
    <div class="mb-8 flex items-center gap-3">
      <div
        class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
        <i class="fa-solid fa-bolt text-white text-sm"></i>
      </div>
      <span class="text-xl font-bold text-indigo-950 tracking-tight">Lutaco</span>
    </div>

    <h2 class="mb-1 text-2xl font-bold tracking-tight text-slate-800">
      {{ 'auth.register.ui.title' | translate }}
    </h2>
    <p class="mb-7 text-sm text-slate-500">
      {{ 'auth.register.ui.subtitle' | translate }}
    </p>

    <!-- Error banner -->
    @if (errorMessage) {
      <div
        class="flex items-center gap-2 px-4 py-3 bg-red-50 border border-red-200 rounded-xl text-red-600 text-sm mb-5">
        <i class="fa-solid fa-circle-exclamation shrink-0"></i>
        <span>{{ errorMessage }}</span>
      </div>
    }

    <!-- Fields -->
    <div class="grid grid-cols-1 gap-x-4 gap-y-4 sm:grid-cols-2">

      <!-- Username (full width) -->
      <div class="col-span-2">
        <app-input
          [required]="true"
          (valueChange)="onFieldChange('username', $event)"
          [autoFocus]="true"
          [errorMessage]="getError('username') | translate"
          [label]="'auth.register.fields.username.label' | translate"
          [placeholder]="'auth.register.fields.username.placeholder' | translate"
          [value]="form.get('username')?.value"
          prefixIconClass="fa-solid fa-user"
        />
      </div>

      <!-- Full name + Email -->
      <app-input
        [required]="true"
        (valueChange)="onFieldChange('fullName', $event)"
        [autoFocus]="false"
        [errorMessage]="getError('fullName') | translate"
        [label]="'auth.register.fields.fullName.label' | translate"
        [placeholder]="'auth.register.fields.fullName.placeholder' | translate"
        [value]="form.get('fullName')?.value"
        prefixIconClass="fa-solid fa-id-card"
      />

      <app-input
        [required]="true"
        (valueChange)="onFieldChange('email', $event)"
        [autoFocus]="false"
        [errorMessage]="getError('email') | translate"
        [label]="'auth.register.fields.email.label' | translate"
        [placeholder]="'auth.register.fields.email.placeholder' | translate"
        [value]="form.get('email')?.value"
        prefixIconClass="fa-solid fa-envelope"
        type="email"
      />

      <!-- Address + Gender -->
      <app-input
        (valueChange)="onFieldChange('address', $event)"
        [autoFocus]="false"
        [errorMessage]="getError('address') | translate"
        [label]="'auth.register.fields.address.label' | translate"
        [placeholder]="'auth.register.fields.address.placeholder' | translate"
        [value]="form.get('address')?.value"
        prefixIconClass="fa-solid fa-location-dot"
      />

      <app-select
        [required]="true"
        (valueChange)="onFieldChange('gender', $event)"
        [errorMessage]="getError('gender') | translate"
        [label]="'auth.register.fields.gender.label' | translate"
        [options]="genderOptions"
        [placeholder]="'auth.register.fields.gender.placeholder' | translate"
        [value]="form.get('gender')?.value"
      />

      <!-- Password + Confirm password -->
      <app-input
        [required]="true"
        (valueChange)="onFieldChange('password', $event)"
        [autoFocus]="false"
        [errorMessage]="getError('password') | translate"
        [label]="'auth.register.fields.password.label' | translate"
        [placeholder]="'auth.register.fields.password.placeholder' | translate"
        [value]="form.get('password')?.value"
        prefixIconClass="fa-solid fa-lock"
        type="password"
      />

      <app-input
        [required]="true"
        (valueChange)="onFieldChange('confirmPassword', $event)"
        [autoFocus]="false"
        [errorMessage]="getError('confirmPassword') | translate"
        [label]="'auth.register.fields.confirmPassword.label' | translate"
        [placeholder]="'auth.register.fields.confirmPassword.placeholder' | translate"
        [value]="form.get('confirmPassword')?.value"
        prefixIconClass="fa-solid fa-lock"
        type="password"
      />
    </div>

    <!-- Submit -->
    <div class="mt-6">
      <app-button
        [fullWidth]="true"
        [label]="'auth.register.ui.submit' | translate"
        [loading]="loading"
        size="large"
        [type]="'submit'"
      />
    </div>

    <!-- Login -->
    <p class="text-center text-sm text-slate-500 mt-6">
      {{ 'auth.register.ui.haveAccount' | translate }}
      <a class="text-indigo-600 hover:text-indigo-500 font-semibold ml-1 transition-colors"
         routerLink="/auth/login">
        {{ 'auth.register.ui.login' | translate }}
      </a>
    </p>

  </form>
</div>
