<div
  class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-50 via-white to-purple-50 px-4 relative overflow-hidden">

  <!-- Background blobs -->
  <div
    class="absolute -top-32 -left-32 w-96 h-96 bg-indigo-300 rounded-full opacity-20 blur-3xl pointer-events-none"></div>
  <div
    class="absolute -bottom-24 -right-24 w-80 h-80 bg-purple-300 rounded-full opacity-20 blur-3xl pointer-events-none"></div>

  <form
    (ngSubmit)="onSubmit()"
    class="w-full max-w-md bg-white rounded-2xl shadow-xl shadow-indigo-100/50 p-10 animate-[slideUp_0.4s_ease-out]">
    <!-- Brand -->
    <div class="flex items-center gap-3 mb-8">
      <div
        class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
        <i class="fa-solid fa-bolt text-white text-sm"></i>
      </div>
      <span class="text-xl font-bold text-indigo-950 tracking-tight">Lutaco</span>
    </div>

    <h2 class="text-2xl font-bold text-slate-800 tracking-tight mb-1">
      {{ 'auth.login.title' | translate }}
    </h2>
    <p class="text-sm text-slate-500 mb-7">
      {{ 'auth.login.subtitle' | translate }}
    </p>

    <!-- Error banner -->
    @if (errorMessage) {
      <div
        class="flex items-center gap-2 px-4 py-3 bg-red-50 border border-red-200 rounded-xl text-red-600 text-sm mb-5">
        <i class="fa-solid fa-circle-exclamation shrink-0"></i>
        <span>{{ errorMessage | translate }}</span>
      </div>
    }

    <!-- Fields -->
    <div class="flex flex-col gap-4">
      <app-input
        [label]="'auth.login.username' | translate"
        [placeholder]="'auth.login.username_placeholder' | translate"
        [errorMessage]="usernameError | translate"
        [value]="form.get('username')?.value"
        prefixIconClass="fa-solid fa-user"
        (valueChange)="onUsernameChange($event)"
        [autoFocus]="true"
      />
      <app-input
        [label]="'auth.login.password' | translate"
        [placeholder]="'auth.login.password_placeholder' | translate"
        [errorMessage]="passwordError | translate"
        [value]="form.get('password')?.value"
        type="password"
        prefixIconClass="fa-solid fa-lock"
        (valueChange)="onPasswordChange($event)"
        [autoFocus]="false"
      />
    </div>

    <!-- Forgot password -->
    <div class="flex justify-end mb-6">
      <a (click)="showToast()"
         class="text-sm cursor-pointer text-indigo-600 hover:text-indigo-500 font-medium transition-colors">
        {{ 'auth.login.forgot_password' | translate }}
      </a>
    </div>

    <!-- Submit -->
    <app-button
      [label]="'auth.login.submit' | translate"
      [loading]="loading"
      [fullWidth]="true"
      [type]="'submit'"
      size="large"
    />

    <!-- Register -->
    <p class="text-center text-sm text-slate-500 mt-6">
      {{ 'auth.login.no_account' | translate }}
      <a routerLink="/auth/register"
         class="text-indigo-600 hover:text-indigo-500 font-semibold ml-1 transition-colors">
        {{ 'auth.login.register' | translate }}
      </a>
    </p>

  </form>
</div>
